<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Encoding -->
    <meta charset="UTF-8" />

    <!-- Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Title -->
    <title>Jorge Yanas | Portfolio</title>

    <!-- SEO -->
    <meta name="description" content="Quant finance and data science portfolio by Jorge Yanas." />
    <meta name="author" content="Jorge Yanas" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="src/assets/ui/logo.png" />

    <!-- Open Graph (LinkedIn, Facebook) -->
    <meta property="og:title" content="Jorge Yanas | Portfolio" />
    <meta property="og:description" content="Quant finance and data science projects." />
    <meta property="og:image" content="/logo.png" />
    <meta property="og:type" content="website" />

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Jorge Yanas | Portfolio" />
    <meta name="twitter:description" content="Quant finance and data science projects." />
    <meta name="twitter:image" content="/logo.png" />

    <!-- Theme color -->
    <meta name="theme-color" content="#0f172a" />

  </head>

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>

    <div id="mobile-warning" style="display:none; font-family: Arial, sans-serif; text-align:center; padding:40px;">
      <h2>This portfolio is optimized for desktop viewing.</h2>
      <p>Please access the site from a computer for the best experience.</p>
    </div>

    <div id="root"></div>
  
    <script>
      function isMobile() {
        return /Android|iPhone|iPad|iPod|Opera Mini|IEMobile|WPDesktop/i.test(navigator.userAgent);
      }

      if (isMobile()) {
        document.getElementById("mobile-warning").style.display = "block";
        document.getElementById("root").style.display = "none";
      }
    </script>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
